# Railway service config for the Manut app.
#
# DEPLOY DESIGN — TWO PATHS:
#
# Path A (documented design — CLAUDE.md §9): GitHub Actions builds the
# image, pushes to Google Artifact Registry, and the Railway service is
# configured ONE-TIME in the dashboard with source.image pointed at
# `asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash:main`.
# The manut-railway-deploy.yml workflow re-tags freshly-built images as
# :main in GAR and triggers `serviceInstanceDeployV2` to roll. This
# path is cheap, fast (~3-5 min deploy), and consistent with the legacy
# GCE/compose deploy on the VM (same image, two destinations).
#
# Path B (fallback — this file): When the Railway service source is
# the GitHub repo instead of a registry image, Railway builds the
# Dockerfile defined below natively on its build runner. This is what
# happens when the dashboard source has never been migrated from
# "GitHub repo" (the default after `New service from repo`) to a
# Docker image source. The build takes 20-30 min on a cold cache and
# uses Railway build minutes — switch to Path A when convenient.
#
# The [build] block below activates Path B. To go back to Path A:
#   1. Set the Railway service source.image in the dashboard.
#   2. Delete the [build] block here (or set builder = "RAILPACK").
#   3. Re-deploy.
#
# Either way, the [deploy] block applies — these are runtime settings
# that work regardless of how the image was produced.
#
# Migration: AFFiNE's predeploy script (`yarn predeploy` from the server
# package — runs `prisma migrate deploy` + admin-user seeding) needs yarn
# at runtime, which isn't installed in the slim runtime image. Instead we
# invoke prisma directly via the local CLI binary in `preDeployCommand`
# below; Railway runs it once per deploy in the same container as the
# app, BEFORE the container starts taking traffic. This:
#   - runs migrations idempotently (prisma migrate deploy is a no-op
#     when the schema is already up to date),
#   - doesn't require yarn in the runtime image,
#   - skips the self-host-predeploy.js wrapper (it generates a
#     ~/.affine/config/private.key for JWT signing — AFFiNE falls back
#     to a random in-memory key without it; restart invalidates sessions
#     but boot still succeeds).
# If you want persistent JWT signing, attach a Railway volume to
# /root/.affine/config and add a one-time `openssl ecparam ...` to the
# preDeployCommand list.
#
# IMPORTANT — do NOT set startCommand here. Railway's startCommand
# replaces the Docker ENTRYPOINT (exec form), which skips
# .docker/manut/entrypoint.railway.sh. That script bridges Railway's
# injected $PORT to AFFINE_SERVER_PORT; without it the server keeps
# listening on 3010 while Railway healthchecks $PORT, and deploy fails
# with "Healthcheck failure". The Dockerfile already sets:
#   ENTRYPOINT ["/usr/local/bin/manut-entrypoint"]
#   CMD ["node", "./dist/main.js"]

[build]
builder        = "DOCKERFILE"
dockerfilePath = ".docker/manut/Dockerfile.railway"

# Runtime (set in Railway dashboard / CLI — not build-time):
#   AFFINE_SERVER_EXTERNAL_URL=https://manut.xyz
#   AFFINE_SERVER_HTTPS=true
# DNS must be CNAME @ → <railway-target>.up.railway.app (see scripts/manut-dns-railway-tls.sh).
# Do not use A records to Railway IPs — browsers will see *.up.railway.app certs.

[deploy]
healthcheckPath    = "/info"
healthcheckTimeout = 120
numReplicas        = 1
# Railway allows at most one preDeployCommand entry (not argv-style arrays).
preDeployCommand = [
  "/bin/sh -c './node_modules/.bin/prisma migrate deploy --schema=./schema.prisma'",
]
restartPolicyMaxRetries = 3
restartPolicyType = "ON_FAILURE"
