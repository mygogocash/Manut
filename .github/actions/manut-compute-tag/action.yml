name: 'Manut compute image tag'
description: 'Compute immutable GAR tag main-<short-sha>-<run_id>'
inputs:
  head_sha:
    description: 'Full commit SHA to tag'
    required: true
outputs:
  tag:
    description: 'Image tag (main-<short>-<run_id>)'
    value: ${{ steps.tag.outputs.tag }}
  short_sha:
    description: '9-char SHA prefix'
    value: ${{ steps.tag.outputs.short_sha }}
  head_sha:
    description: 'Full SHA echoed for downstream jobs'
    value: ${{ steps.tag.outputs.head_sha }}
runs:
  using: 'composite'
  steps:
    - name: Compute image tag
      id: tag
      shell: bash
      env:
        HEAD_SHA: ${{ inputs.head_sha }}
        RUN_ID: ${{ github.run_id }}
      run: |
        SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-9)
        IMAGE_TAG="main-${SHORT_SHA}-${RUN_ID}"
        {
          echo "tag=${IMAGE_TAG}"
          echo "short_sha=${SHORT_SHA}"
          echo "head_sha=${HEAD_SHA}"
        } >> "$GITHUB_OUTPUT"
        echo "Computed image tag: ${IMAGE_TAG}"
