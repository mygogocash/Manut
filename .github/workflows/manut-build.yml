name: 🏗️ Manut Build
run-name: '🏗️ Build #${{ github.run_number }} • ${{ github.event.workflow_run.display_title || github.event.head_commit.message || github.event_name }} • by ${{ github.actor }}'

# Tier 2 split: build + push only. Deploy is `Manut Auto Deploy` / Railway.
#
# Job chain (visible in the Actions graph for monitoring):
#   ① Plan → ② Native + Landing (parallel) → ③ Bundle → ④ Push image → ⑤ Publish
#
# Cross-workflow handoff to deploy still uses the `image-tag` artifact only
# (workflow_run does not propagate job outputs).

on:
  workflow_run:
    workflows: ['✅ Manut CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      nuke_cache:
        description: 'Wipe the registry buildx cache before this build (cold cache, full rebuild).'
        type: boolean
        required: false
        default: false

concurrency:
  group: manut-build
  cancel-in-progress: false

env:
  YARN_ENABLE_HARDENED_MODE: 0
  GAR_REGION: asia-southeast1
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash
  GAR_CACHE_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash-cache
  GCP_PROJECT: affine-495114
  HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ── Gate (same condition as the old monolithic build job) ─────────────
  plan:
    name: ① Plan
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
      head_sha: ${{ steps.tag.outputs.head_sha }}
      should_run: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}

      - uses: ./.github/actions/manut-compute-tag
        id: tag
        with:
          head_sha: ${{ env.HEAD_SHA }}

      - name: Pipeline plan summary
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          SHORT_SHA: ${{ steps.tag.outputs.short_sha }}
          HEAD_SHA: ${{ steps.tag.outputs.head_sha }}
        run: |
          {
            echo "## Manut Build — plan"
            echo ""
            echo "| Stage | Job |"
            echo "|-------|-----|"
            echo "| ② | Native (napi) + Landing (parallel) |"
            echo "| ③ | Bundle server + web + admin + mobile |"
            echo "| ④ | Docker build + push to GAR |"
            echo "| ⑤ | Publish artifacts for deploy |"
            echo ""
            echo "- Commit: \`${SHORT_SHA}\` (\`${HEAD_SHA}\`)"
            echo "- Planned image tag: \`${IMAGE_TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  native:
    name: ② Native (napi)
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: ./.github/actions/manut-checkout
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Setup Rust (stable, x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/native/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/backend/native/Cargo.lock', 'packages/backend/native/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: ./.github/actions/manut-yarn

      - name: Build napi native binary (server-native.x64.node)
        run: |
          cd packages/backend/native
          yarn build --target x86_64-unknown-linux-gnu
          echo "--- files after napi build ---"
          find . -maxdepth 1 -name '*.node' -print
          PRODUCED=""
          for candidate in server-native*.node; do
            [ -e "$candidate" ] || continue
            case "$candidate" in
              server-native.node|server-native.x64.node|server-native.arm64.node|server-native.armv7.node)
                continue
                ;;
            esac
            PRODUCED="$candidate"
            break
          done
          if [ -z "$PRODUCED" ]; then
            if [ -f server-native.node ]; then PRODUCED=server-native.node; fi
          fi
          if [ -z "$PRODUCED" ]; then
            echo "ERROR: napi build produced no server-native*.node file" >&2
            ls -la 2>&1
            exit 1
          fi
          echo "napi produced: $PRODUCED"
          [ "$PRODUCED" != "server-native.x64.node" ] && cp "$PRODUCED" server-native.x64.node
          [ "$PRODUCED" != "server-native.node" ]     && cp "$PRODUCED" server-native.node
          touch server-native.arm64.node server-native.armv7.node

      - uses: actions/upload-artifact@v4
        with:
          name: manut-native
          path: |
            packages/backend/native/server-native.node
            packages/backend/native/server-native.x64.node
            packages/backend/native/server-native.arm64.node
            packages/backend/native/server-native.armv7.node
          retention-days: 1
          if-no-files-found: error

  landing:
    name: ② Landing site
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/manut-checkout
        with:
          ref: ${{ env.HEAD_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build marketing landing site
        run: |
          cd manut-landing
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: manut-landing
          path: manut-landing/out
          retention-days: 1
          if-no-files-found: error

  bundle:
    name: ③ Bundle (server + web)
    needs: [plan, native]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: ./.github/actions/manut-checkout
        with:
          ref: ${{ env.HEAD_SHA }}

      - uses: actions/download-artifact@v4
        with:
          name: manut-native
          path: packages/backend/native

      - uses: ./.github/actions/manut-yarn

      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate

      - name: Prune stale dist artifacts
        run: |
          rm -rf packages/frontend/apps/web/dist
          rm -rf packages/frontend/apps/mobile/dist
          rm -rf packages/frontend/admin/dist
          rm -rf packages/backend/server/dist

      - name: Build server bundle
        run: yarn affine bundle -p @affine/server

      - name: Build frontend bundles
        run: |
          yarn affine bundle -p web
          yarn affine bundle -p admin
          yarn affine bundle -p mobile

      - name: Check no source files drifted during build
        run: |
          if [ -n "$(git status --porcelain packages/ blocksuite/ tools/)" ]; then
            echo "::error::source tree drifted during build:"
            git status --short packages/ blocksuite/ tools/ | head -50
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: manut-dist
          path: |
            packages/backend/server/dist
            packages/frontend/apps/web/dist
            packages/frontend/admin/dist
            packages/frontend/apps/mobile/dist
          retention-days: 1
          if-no-files-found: error

  push-image:
    name: ④ Docker push
    needs: [plan, bundle, landing]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      image_digest: ${{ steps.build_push.outputs.digest }}
    env:
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: ./.github/actions/manut-checkout
        with:
          ref: ${{ env.HEAD_SHA }}

      - uses: actions/download-artifact@v4
        with:
          name: manut-dist
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: manut-landing
          path: manut-landing/out

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker "${{ env.GAR_REGION }}-docker.pkg.dev" --quiet

      - name: Nuke buildx cache image (escape hatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.nuke_cache == 'true'
        env:
          CACHE_IMAGE: ${{ env.GAR_CACHE_REPO }}:buildx
        run: |
          gcloud artifacts docker images delete "${CACHE_IMAGE}" --quiet --delete-tags || true

      - uses: docker/setup-buildx-action@v3

      - name: Build + push image
        id: build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/manut/Dockerfile.fullstack
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GAR_REPO }}:${{ needs.plan.outputs.image_tag }}
          cache-from: type=registry,ref=${{ env.GAR_CACHE_REPO }}:buildx
          cache-to: type=registry,ref=${{ env.GAR_CACHE_REPO }}:buildx,mode=max
          no-cache-filters: assets

  publish:
    name: ⑤ Publish artifacts
    needs: [plan, native, landing, bundle, push-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && needs.plan.result == 'success' && needs.push-image.result == 'success'
    steps:
      - name: Write image-tag artifact (cross-workflow handoff)
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          HEAD_SHA: ${{ needs.plan.outputs.head_sha }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p artifact
          {
            echo "image_tag=${IMAGE_TAG}"
            echo "short_sha=${SHORT_SHA}"
            echo "head_sha=${HEAD_SHA}"
            echo "build_run_id=${BUILD_RUN_ID}"
          } > artifact/image-tag.txt
          cat artifact/image-tag.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: artifact/image-tag.txt
          retention-days: 7
          if-no-files-found: error

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Write Manut handover artifact
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          IMAGE_DIGEST: ${{ needs.push-image.outputs.image_digest }}
          GAR_REPO: ${{ env.GAR_REPO }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          HEAD_SHA: ${{ needs.plan.outputs.head_sha }}
        run: |
          node scripts/manut-release-handover.mjs \
            --mode build \
            --status "build image produced" \
            --image-tag "${IMAGE_TAG}" \
            --image-digest "${IMAGE_DIGEST}" \
            --gar-repo "${GAR_REPO}" \
            --short-sha "${SHORT_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --output artifact/manut-handover.md \
            --json-output artifact/manut-handover.json

      - uses: actions/upload-artifact@v4
        with:
          name: manut-handover
          path: |
            artifact/manut-handover.md
            artifact/manut-handover.json
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          HEAD_SHA: ${{ needs.plan.outputs.head_sha }}
          IMAGE_DIGEST: ${{ needs.push-image.outputs.image_digest }}
          GAR_REPO_VAR: ${{ env.GAR_REPO }}
          CACHE_IMAGE: ${{ env.GAR_CACHE_REPO }}:buildx
          NUKE_CACHE: ${{ github.event.inputs.nuke_cache }}
        run: |
          {
            echo "## Manut Build — complete"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| ① Plan | ✅ |"
            echo "| ② Native | ${{ needs.native.result == 'success' && '✅' || needs.native.result }} |"
            echo "| ② Landing | ${{ needs.landing.result == 'success' && '✅' || needs.landing.result }} |"
            echo "| ③ Bundle | ${{ needs.bundle.result == 'success' && '✅' || needs.bundle.result }} |"
            echo "| ④ Docker push | ✅ |"
            echo "| ⑤ Publish | ✅ |"
            echo ""
            echo "- Commit: \`${SHORT_SHA}\` (\`${HEAD_SHA}\`)"
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Image digest: \`${IMAGE_DIGEST:-unknown}\`"
            echo "- Registry: \`${GAR_REPO_VAR}\`"
            echo ""
            echo "**Machine-readable**: \`IMAGE_TAG=${IMAGE_TAG}\`"
            echo ""
            echo "Downstream \`Manut Auto Deploy\` / \`Manut Railway Deploy\` consume the \`image-tag\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"
