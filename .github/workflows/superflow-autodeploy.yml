name: Superflow Auto Deploy

# Tier 1 reliability fix: smoke-then-swap with sidecar validation +
# auto-rollback. Replaces the prior "swap-then-smoke" pattern that took
# production down 4+ times in one day.
#
# Design:
#   Build  -> push image with an immutable, run-unique tag
#                (main-<short-sha>-<run-id>) — never reuses a tag, so no
#                clobber risk.
#   Deploy -> hand off to /srv/affine/scripts/deploy.sh on the VM. That
#                script:
#                  1. pulls the new image
#                  2. boots it as a SIDECAR container with health-checks
#                  3. only swaps prod onto the new image after the sidecar
#                     is healthy (smoke-then-swap)
#                  4. runs a post-swap smoke; if that fails, the script
#                     auto-rolls back to the prior image.
#
# Exit-code contract from /srv/affine/scripts/deploy.sh (CRITICAL):
#   0 = success — prod is on the new image
#   1 = sidecar validation failed — prod was NEVER touched, still on prior
#       image. No rollback needed.
#   2 = post-swap smoke failed — auto-rolled back, prod is on prior image.
#   3 = rollback itself failed — prod may be DOWN. Manual intervention.
#   *  = anything else — treated as 3.
#
# Tags pushed to GAR:
#   :<run-unique-tag>   (immutable; this is the only tag we deploy with)
# We intentionally do NOT push :latest or a plain :main-<sha> here. Those
# floating tags are what enabled the clobber-then-redeploy regressions
# that took prod down. If you need a "current main" pointer, query GAR
# tags by image creation timestamp or the deploy script's metadata.
#
# WIF auth (no JSON key — org policy forbids them):
#   provider: projects/602860445793/.../providers/github
#   service account: affine-gha-deployer@affine-495114.iam.gserviceaccount.com
# That SA has iam.serviceAccountUser on the affine-vm runtime SA, which
# is what makes `gcloud compute ssh` work over IAP.

on:
  workflow_run:
    workflows: ['Superflow CI']
    types: [completed]
    branches: [main]

# Cancel an older in-flight build if a fresher commit lands on main.
# CAVEAT: `cancel-in-progress` only kills the GitHub runner. If the
# cancel happens while the runner is mid-`gcloud compute ssh`, the
# remote `deploy.sh` on the VM keeps running to completion (it's an
# independent process under sudo). That's actually what we want: the
# VM-side script is the unit of work, not the Action runner. Worst
# case: GitHub shows the older run as "cancelled" while the VM still
# completes the deploy and the next workflow_run kicks off fresh.
concurrency:
  group: superflow-autodeploy
  cancel-in-progress: true

env:
  YARN_ENABLE_HARDENED_MODE: 0
  GAR_REGION: asia-southeast1
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash
  GCP_PROJECT: affine-495114
  GCE_ZONE: asia-southeast1-a
  GCE_VM: affine-vm
  PROD_HOST: affine.gogocash.co
  SMOKE_TIMEOUT_SECS: '90'

jobs:
  build-and-deploy:
    name: Build image + safe-deploy
    # Only run when CI succeeded on a push event to main (not a PR
    # merge-queue check, not a workflow_run from a fork).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Setup Rust (stable, x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/native/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/backend/native/Cargo.lock', 'packages/backend/native/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: yarn install --immutable

      - name: Build napi native binary (server-native.x64.node)
        # napi-rs CLI's filename convention varies by version (v2 uses
        # target-triple suffix `linux-x64-gnu`, v3 sometimes drops it).
        # Don't guess — list whatever napi produced, then rename.
        # The wrapper at packages/backend/native/index.js tries:
        #   ./server-native.node       (first try)
        #   ./server-native.x64.node   (fallback x64)
        #   ./server-native.arm64.node (fallback arm64 — unused on amd64)
        #   ./server-native.armv7.node (fallback armv7 — unused on amd64)
        # rspack statically resolves all four at compile time. Materialize
        # the real binary at the bare + x64 names; touch dummies for arm.
        # No untrusted input — all literals.
        run: |
          cd packages/backend/native
          yarn build --target x86_64-unknown-linux-gnu
          echo "--- files after napi build ---"
          ls -la *.node 2>&1 || true
          PRODUCED=$(ls server-native*.node 2>/dev/null | grep -v -E '^server-native(\.node|\.(x64|arm64|armv7)\.node)$' | head -1)
          if [ -z "$PRODUCED" ]; then
            # Maybe napi already wrote it as the bare name
            if [ -f server-native.node ]; then PRODUCED=server-native.node; fi
          fi
          if [ -z "$PRODUCED" ]; then
            echo "ERROR: napi build produced no server-native*.node file" >&2
            ls -la 2>&1
            exit 1
          fi
          echo "napi produced: $PRODUCED"
          # Materialize the real binary at both names rspack/index.js need.
          # If napi already wrote it as the bare name, only copy to x64.
          [ "$PRODUCED" != "server-native.x64.node" ] && cp "$PRODUCED" server-native.x64.node
          [ "$PRODUCED" != "server-native.node" ]     && cp "$PRODUCED" server-native.node
          touch server-native.arm64.node server-native.armv7.node
          echo "--- files after rename ---"
          ls -la server-native.*.node server-native.node 2>&1 | head -10

      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate

      - name: Build server bundle
        run: yarn affine bundle -p @affine/server

      - name: Build frontend bundles
        # All three bundles built — mobile rebuild is required because
        # Dockerfile copies mobile/dist into /app/static/mobile, and
        # backend's DocRendererController.readHtmlAssets reads the
        # assets-manifest.json from there at boot. An empty dir crashes
        # the server with ENOENT before it can bind port 3010. The earlier
        # `mkdir -p` "skip mobile" shortcut took prod down — don't do it.
        run: |
          yarn affine bundle -p web
          yarn affine bundle -p admin
          yarn affine bundle -p mobile

      - name: Authenticate to GCP
        # Workload Identity Federation — no JSON key (org policy
        # constraints/iam.disableServiceAccountKeyCreation forbids them).
        # GitHub OIDC token impersonates the service account directly.
        # No untrusted input — only literal WIF provider id and SA email.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      # head_sha is a hex SHA. RUN_ID is a numeric ID from GitHub.
      # Concatenated tag is shell-safe.
      - name: Compute image tag
        id: tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-9)
          IMAGE_TAG="main-${SHORT_SHA}-${RUN_ID}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: ${IMAGE_TAG}"

      - name: Build + push image
        # ONE tag only: the run-unique immutable tag. We deliberately do
        # NOT push :latest or :main-<sha> here — those floating tags were
        # what made the clobber-then-redeploy regression possible.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/gogocash/Dockerfile.fullstack
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GAR_REPO }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # IMAGE_TAG is `main-<9hex>-<numeric>` — cannot contain shell
      # metacharacters. Pass via env to keep the SSH command shell-safe.
      - name: Safe-deploy to GCE VM (smoke-then-swap)
        id: deploy
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set +e
          gcloud compute ssh "$GCE_VM" \
            --zone="$GCE_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command="sudo /srv/affine/scripts/deploy.sh \
              --image-tag '${IMAGE_TAG}' \
              --smoke-timeout-secs ${SMOKE_TIMEOUT_SECS} \
              --rollback-on-failure"
          DEPLOY_RC=$?
          set -e
          echo "deploy_rc=${DEPLOY_RC}" >> "$GITHUB_OUTPUT"
          echo "deploy.sh exit code: ${DEPLOY_RC}"
          # Defer the actual job-fail to the Summary step so we can emit
          # a useful job-summary first.
          exit 0

      - name: Summary
        # Always run — the job-summary should be written even if deploy
        # failed. Final `exit` honors deploy.sh exit code so the workflow
        # status reflects reality.
        if: always()
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          SHORT_SHA: ${{ steps.tag.outputs.short_sha }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          DEPLOY_RC: ${{ steps.deploy.outputs.deploy_rc }}
        run: |
          {
            echo "## Superflow Auto Deploy"
            echo ""
            echo "- Commit: \`${SHORT_SHA}\` (\`${HEAD_SHA}\`)"
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Production: https://${PROD_HOST}"
            echo "- deploy.sh exit code: \`${DEPLOY_RC}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          case "${DEPLOY_RC}" in
            0)
              {
                echo "### Status: SUCCESS"
                echo ""
                echo "Deployed \`${IMAGE_TAG}\`. Prod is on the new image."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            1)
              {
                echo "### Status: VALIDATION FAILED (prod untouched)"
                echo ""
                echo "The new image failed pre-deploy sidecar validation."
                echo "Production is still on the previous image — nothing"
                echo "was swapped. Investigate the new image, then either"
                echo "re-deploy a fixed build or roll forward."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              {
                echo "### Status: AUTO-ROLLED BACK"
                echo ""
                echo "The new image passed sidecar validation but failed"
                echo "the post-swap smoke test. deploy.sh auto-rolled back"
                echo "to the previous image. Production is on the previous"
                echo "image."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            3)
              {
                echo "### Status: CRITICAL — ROLLBACK FAILED"
                echo ""
                echo "The new image failed AND the rollback step itself"
                echo "failed. Production may be DOWN. SSH to the VM and"
                echo "investigate immediately:"
                echo ""
                echo '```bash'
                echo "gcloud compute ssh ${GCE_VM} --zone=${GCE_ZONE} --project=${GCP_PROJECT} --tunnel-through-iap"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              {
                echo "### Status: UNKNOWN EXIT CODE (treated as critical)"
                echo ""
                echo "deploy.sh exited with code \`${DEPLOY_RC}\`. Treating"
                echo "as a possible production outage. SSH to the VM and"
                echo "investigate immediately."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

          # Honor exit code: 0 means success, anything else fails the job.
          if [ "${DEPLOY_RC}" = "0" ]; then
            exit 0
          else
            exit 1
          fi
