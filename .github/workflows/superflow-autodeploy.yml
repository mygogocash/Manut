name: Superflow Auto Deploy

# Fires automatically when Superflow CI completes successfully on a push
# to main. Skipped on CI failures, PR runs, or any other branch.
#
# Flow: CI passes on main → build full Docker image (napi + all bundles)
# → push to GAR tagged main-<sha> + latest → SSH-deploy to GCE VM
# → smoke-test the live endpoint.
#
# Required secrets (same as superflow-release + superflow-deploy):
#   GCP_SA_KEY: service-account JSON with these roles on affine-495114:
#     - roles/artifactregistry.writer  (push image to GAR)
#     - roles/compute.instanceAdmin.v1 (SSH into VM)
#     - roles/iap.tunnelResourceAccessor (IAP tunnel)

on:
  workflow_run:
    workflows: ['Superflow CI']
    types: [completed]
    branches: [main]

env:
  YARN_ENABLE_HARDENED_MODE: 0
  GAR_REGION: asia-southeast1
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash
  GCP_PROJECT: affine-495114
  GCE_ZONE: asia-southeast1-a
  GCE_VM: affine-vm
  PROD_HOST: affine.gogocash.co

jobs:
  build-and-deploy:
    name: Build image + deploy to production
    # Only run when CI succeeded on a push event (not a PR merge check).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Setup Rust (stable, x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/native/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/backend/native/Cargo.lock', 'packages/backend/native/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: yarn install --immutable

      - name: Build napi native binary (server-native.x64.node)
        # napi-rs CLI's filename convention varies by version (v2 uses
        # target-triple suffix `linux-x64-gnu`, v3 sometimes drops it).
        # Don't guess — list whatever napi produced, then rename.
        # The wrapper at packages/backend/native/index.js tries:
        #   ./server-native.node       (first try)
        #   ./server-native.x64.node   (fallback x64)
        #   ./server-native.arm64.node (fallback arm64 — unused on amd64)
        #   ./server-native.armv7.node (fallback armv7 — unused on amd64)
        # rspack statically resolves all four at compile time. Materialize
        # the real binary at the bare + x64 names; touch dummies for arm.
        # No untrusted input — all literals.
        run: |
          cd packages/backend/native
          yarn build --target x86_64-unknown-linux-gnu
          echo "--- files after napi build ---"
          ls -la *.node 2>&1 || true
          PRODUCED=$(ls server-native*.node 2>/dev/null | grep -v -E '^server-native(\.node|\.(x64|arm64|armv7)\.node)$' | head -1)
          if [ -z "$PRODUCED" ]; then
            # Maybe napi already wrote it as the bare name
            if [ -f server-native.node ]; then PRODUCED=server-native.node; fi
          fi
          if [ -z "$PRODUCED" ]; then
            echo "ERROR: napi build produced no server-native*.node file" >&2
            ls -la 2>&1
            exit 1
          fi
          echo "napi produced: $PRODUCED"
          cp "$PRODUCED" server-native.x64.node
          cp "$PRODUCED" server-native.node
          touch server-native.arm64.node server-native.armv7.node
          echo "--- files after rename ---"
          ls -la server-native.*.node server-native.node 2>&1 | head -10

      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate

      - name: Build server bundle
        run: yarn affine bundle -p @affine/server

      - name: Build frontend bundles
        # Mobile bundle intentionally skipped — Superflow is website-first
        # for now. Dockerfile.fullstack still COPYs mobile/dist so we make
        # an empty placeholder directory; mobile-web routes will serve no
        # assets but the website + admin are unaffected.
        run: |
          yarn affine bundle -p web
          yarn affine bundle -p admin
          mkdir -p packages/frontend/apps/mobile/dist

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      # head_sha is a hex SHA — safe to use via env var in shell.
      - name: Compute image tag
        id: tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "tag=main-${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/gogocash/Dockerfile.fullstack
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GAR_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.GAR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TAG is main-<7hex> — cannot contain shell metacharacters.
      - name: Deploy to GCE VM
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gcloud compute ssh "$GCE_VM" \
            --zone="$GCE_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command="
              set -e
              sudo cp /srv/affine/compose/compose.yml /srv/affine/compose/compose.yml.pre-${TAG}.bak
              sudo sed -i -E 's|(affine-gogocash:)[^ \"]+|\1${TAG}|g' /srv/affine/compose/compose.yml
              cd /srv/affine/compose
              sudo docker compose pull affine
              sudo docker compose up -d --force-recreate affine
              echo 'deploy: containers up'
            "

      - name: Smoke test (/info returns 200)
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://${PROD_HOST}/info" || true)
            if [ "$code" = "200" ]; then
              echo "smoke: HTTP 200 after ${i}x3s"
              exit 0
            fi
            sleep 3
          done
          echo "::error::smoke test failed — /info never returned 200"
          exit 1

      - name: Summary
        if: always()
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## Superflow Auto Deploy"
            echo ""
            echo "- Commit: \`${HEAD_SHA:0:7}\`"
            echo "- Image tag: \`$TAG\`"
            echo "- Production: https://${PROD_HOST}"
            echo ""
            echo "### Rollback (under 60s)"
            echo '```bash'
            echo "gcloud compute ssh $GCE_VM --zone=$GCE_ZONE --project=$GCP_PROJECT \\"
            echo "  --tunnel-through-iap --command='cd /srv/affine/compose && \\"
            echo "  sudo cp compose.yml.pre-${TAG}.bak compose.yml && \\"
            echo "  sudo docker compose up -d --force-recreate affine'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
