name: 🎯 Manut Deploy (manual)
run-name: 🎯 Deploy ${{ inputs.tag }} • ${{ github.actor }}

# Manually triggered. Deploys a chosen image tag to production using the
# Tier 1 safe-deploy contract (smoke-then-swap with sidecar validation +
# auto-rollback). The actual deploy logic lives in
# /srv/affine/scripts/deploy.sh on the VM — this workflow is just a
# trigger that authenticates to GCP, SSHes in, and interprets the
# script's exit code.
#
# Use this for:
#   - Deploying a specific tagged release (e.g. main-<sha>-<run-id>,
#     or a v*.*.* release tag)
#   - Re-deploying after fixing an image that failed validation in
#     the auto-deploy path (exit code 1)
#
# Exit-code contract (matches manut-autodeploy.yml):
#   0 = success — prod is on the new image
#   1 = sidecar validation failed — prod NEVER touched, still on prior image
#   2 = post-swap smoke failed — auto-rolled back, prod is on prior image
#   3 = rollback itself failed — prod may be DOWN, manual intervention
#   * = unknown — treated as 3
#
# To manually roll back to a known-good tag, use the
# `Manut Rollback` workflow instead — it's a one-click revert that
# reads /srv/affine/compose/compose.yml.previous.bak.
#
# Required GCP roles on affine-495114 (granted to
# affine-gha-deployer@affine-495114.iam.gserviceaccount.com via WIF):
#   - roles/iap.tunnelResourceAccessor (IAP SSH)
#   - roles/compute.instanceAdmin.v1   (compute ssh)
#   - roles/iam.serviceAccountUser     (impersonate the VM's runtime SA)
#   - roles/artifactregistry.reader    (validate tag exists in GAR)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g. main-839e398a-25346091234, or v1.10.2)'
        required: true
        type: string
      smoke_timeout_secs:
        description: 'Sidecar validation timeout in seconds (default 90)'
        required: false
        type: string
        default: '90'

env:
  GCP_PROJECT: affine-495114
  GCE_ZONE: asia-southeast1-a
  GCE_VM: affine-vm
  PROD_HOST: manut.xyz
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash

jobs:
  deploy:
    name: Safe-deploy chosen tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        # Workload Identity Federation — see manut-autodeploy.yml.
        # No untrusted input; literal WIF provider id and SA email.
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      # TAG is user-supplied input. Charset-validate FIRST so we can pass
      # it safely to subsequent shell + SSH commands.
      - name: Validate tag charset (defense-in-depth)
        env:
          TAG: ${{ inputs.tag }}
        run: |
          # GAR docker tag: alnum, dot, underscore, hyphen, max 128 chars.
          # We're stricter: require [A-Za-z0-9._-] only.
          if ! printf '%s' "${TAG}" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::Tag contains characters outside [A-Za-z0-9._-]"
            exit 1
          fi
          if [ "${#TAG}" -gt 128 ]; then
            echo "::error::Tag exceeds 128 characters"
            exit 1
          fi

      - name: Validate smoke_timeout_secs
        env:
          SMOKE_TIMEOUT_SECS: ${{ inputs.smoke_timeout_secs }}
        run: |
          if ! printf '%s' "${SMOKE_TIMEOUT_SECS}" | grep -Eq '^[0-9]+$'; then
            echo "::error::smoke_timeout_secs must be a positive integer"
            exit 1
          fi
          if [ "${SMOKE_TIMEOUT_SECS}" -lt 10 ] || [ "${SMOKE_TIMEOUT_SECS}" -gt 600 ]; then
            echo "::error::smoke_timeout_secs out of range [10, 600]"
            exit 1
          fi

      - name: Validate tag exists in registry
        # Use `images describe` instead of `tags list --filter` — the
        # filter syntax for tags list is finicky (false negatives on
        # known-existing tags). `describe` is a strict existence check.
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if gcloud artifacts docker images describe \
               "${GAR_REPO}:${TAG}" >/dev/null 2>&1; then
            echo "Tag verified in GAR: ${GAR_REPO}:${TAG}"
          else
            echo "::error::tag '${TAG}' not found in GAR (${GAR_REPO})"
            exit 1
          fi

      - name: Safe-deploy to GCE VM (smoke-then-swap)
        id: deploy
        env:
          TAG: ${{ inputs.tag }}
          SMOKE_TIMEOUT_SECS: ${{ inputs.smoke_timeout_secs }}
        run: |
          set +e
          gcloud compute ssh "$GCE_VM" \
            --zone="$GCE_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command="sudo /srv/affine/scripts/deploy.sh \
              --image-tag '${TAG}' \
              --smoke-timeout-secs ${SMOKE_TIMEOUT_SECS} \
              --rollback-on-failure"
          DEPLOY_RC=$?
          set -e
          echo "deploy_rc=${DEPLOY_RC}" >> "$GITHUB_OUTPUT"
          echo "deploy.sh exit code: ${DEPLOY_RC}"
          exit 0

      - name: Summary
        if: always()
        env:
          TAG: ${{ inputs.tag }}
          DEPLOY_RC: ${{ steps.deploy.outputs.deploy_rc }}
        run: |
          {
            echo "## Manut Deploy"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Production: https://${PROD_HOST}"
            echo "- deploy.sh exit code: \`${DEPLOY_RC}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          case "${DEPLOY_RC}" in
            0)
              {
                echo "### Status: SUCCESS"
                echo ""
                echo "Deployed \`${TAG}\`. Prod is on the new image."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            1)
              {
                echo "### Status: VALIDATION FAILED (prod untouched)"
                echo ""
                echo "The new image failed pre-deploy sidecar validation."
                echo "Production is still on the previous image — nothing"
                echo "was swapped. Investigate the new image then either"
                echo "fix and rebuild, or roll forward."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              {
                echo "### Status: AUTO-ROLLED BACK"
                echo ""
                echo "The new image passed sidecar validation but failed"
                echo "the post-swap smoke test. deploy.sh auto-rolled back."
                echo "Production is on the previous image."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            3)
              {
                echo "### Status: CRITICAL — ROLLBACK FAILED"
                echo ""
                echo "The new image failed AND the rollback step itself"
                echo "failed. Production may be DOWN. SSH to the VM and"
                echo "investigate immediately:"
                echo ""
                echo '```bash'
                echo "gcloud compute ssh ${GCE_VM} --zone=${GCE_ZONE} --project=${GCP_PROJECT} --tunnel-through-iap"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              {
                echo "### Status: UNKNOWN EXIT CODE (treated as critical)"
                echo ""
                echo "deploy.sh exited with code \`${DEPLOY_RC}\`. Treating"
                echo "as a possible production outage. SSH to the VM and"
                echo "investigate immediately."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

          if [ "${DEPLOY_RC}" = "0" ]; then
            exit 0
          else
            exit 1
          fi

      - name: Notify Slack
        # See manut-autodeploy.yml for the full design rationale. This
        # is the same step trimmed for the manual-deploy context: TAG
        # comes from the workflow_dispatch input rather than a computed
        # tag step, and there is no head_sha / short_sha to report. All
        # ${{ }} interpolations flow through env: per workflow-injection
        # hardening; the webhook URL never appears in shell command
        # strings.
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OUTCOME: ${{ job.status }}
          DEPLOY_RC: ${{ steps.deploy.outputs.deploy_rc }}
          IMAGE_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not configured — skipping notification"
            exit 0
          fi

          case "${DEPLOY_RC:-}" in
            0)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "✅ ${REPO}: deployed via ${WORKFLOW_NAME}" \
                "Image: ${IMAGE_TAG}" \
                "Triggered by ${ACTOR}" \
                "Run: ${RUN_URL}")
              ;;
            1)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "🔴 ${REPO}: deploy FAILED via ${WORKFLOW_NAME}" \
                "Reason: sidecar validation failed (prod untouched, still on prior tag)" \
                "Run: ${RUN_URL}" \
                "Production: still on prior tag")
              ;;
            2)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "🔴 ${REPO}: deploy FAILED via ${WORKFLOW_NAME}" \
                "Reason: post-swap smoke or prompt-seed failed; auto-rolled back" \
                "Run: ${RUN_URL}" \
                "Production: still on prior tag")
              ;;
            3)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "🚨 ${REPO}: deploy FAILED via ${WORKFLOW_NAME}" \
                "Reason: rollback itself failed — production may be DOWN" \
                "Run: ${RUN_URL}" \
                "Production: manually intervene")
              ;;
            *)
              if [ "${OUTCOME}" = "success" ]; then
                msg=$(printf '%s\n%s' \
                  "✅ ${REPO}: ${WORKFLOW_NAME} succeeded" \
                  "Run: ${RUN_URL}")
              else
                msg=$(printf '%s\n%s\n%s\n%s' \
                  "🔴 ${REPO}: deploy FAILED via ${WORKFLOW_NAME}" \
                  "Reason: workflow failed before deploy ran (validation / auth)" \
                  "Run: ${RUN_URL}" \
                  "Production: still on prior tag")
              fi
              ;;
          esac

          payload=$(jq -nc --arg t "$msg" '{text:$t}')
          curl --silent --show-error --max-time 10 \
            -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL" \
            >/dev/null 2>&1 || true
          echo "Slack notification dispatched."
