name: Superflow Release

# Triggered when a `v*.*.*` tag is pushed.
#
# Builds the napi-rs native binary (linux/amd64) via Rust, then all four
# bundles (web / admin / mobile / @affine/server), then builds + pushes
# the multi-stage Docker image to Google Artifact Registry, tagged with
# both the version and `latest`.
#
# Required GitHub repository secrets:
#   - GCP_SA_KEY: service-account JSON with roles/artifactregistry.writer
#                 on project affine-495114 (or whatever project hosts the
#                 affine-gogocash repo).
#
# Deploy is intentionally a separate manual workflow (superflow-deploy.yml)
# so a tag push doesn't auto-deploy to prod without explicit approval.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  YARN_ENABLE_HARDENED_MODE: 0
  GAR_REGION: asia-southeast1
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash

jobs:
  build-and-push:
    name: Build bundles + image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Setup Rust (stable, x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/native/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/backend/native/Cargo.lock', 'packages/backend/native/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: yarn install --immutable

      # napi binary first — server bundle imports it, so this must come
      # before yarn affine bundle -p @affine/server.
      # napi build emits server-native.linux-x64-gnu.node (target-triple
      # name). The wrapper at packages/backend/native/index.js requires
      # ./server-native.node first, then falls back to arch-suffix names
      # (x64 / arm64 / armv7) — and rspack statically resolves all three
      # branches at compile time, even though only x64 runs in our
      # linux/amd64 prod image. Rename to the bare + arch names; touch
      # dummies for the unused arms so rspack resolution succeeds.
      # No untrusted input — all literals.
      - name: Build napi native binary (server-native.x64.node)
        # See superflow-autodeploy.yml for explanation. Don't guess
        # the napi filename — detect after build.
        run: |
          cd packages/backend/native
          yarn build --target x86_64-unknown-linux-gnu
          echo "--- files after napi build ---"
          ls -la *.node 2>&1 || true
          PRODUCED=$(ls server-native*.node 2>/dev/null | grep -v -E '^server-native(\.node|\.(x64|arm64|armv7)\.node)$' | head -1)
          if [ -z "$PRODUCED" ]; then
            if [ -f server-native.node ]; then PRODUCED=server-native.node; fi
          fi
          if [ -z "$PRODUCED" ]; then
            echo "ERROR: napi build produced no server-native*.node file" >&2
            ls -la 2>&1
            exit 1
          fi
          echo "napi produced: $PRODUCED"
          # Skip self-copy if napi already produced the canonical name.
          [ "$PRODUCED" != "server-native.x64.node" ] && cp "$PRODUCED" server-native.x64.node
          [ "$PRODUCED" != "server-native.node" ]     && cp "$PRODUCED" server-native.node
          touch server-native.arm64.node server-native.armv7.node
          echo "--- files after rename ---"
          ls -la server-native.*.node server-native.node 2>&1 | head -10

      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate

      - name: Build server bundle
        run: yarn affine bundle -p @affine/server

      # Mobile bundle intentionally skipped — Superflow is website-first
      # for now. Dockerfile.fullstack still COPYs mobile/dist so we make
      # an empty placeholder directory; mobile-web routes will serve no
      # assets but the website + admin are unaffected.
      - name: Build frontend bundles
        run: |
          yarn affine bundle -p web
          yarn affine bundle -p admin
          mkdir -p packages/frontend/apps/mobile/dist

      - name: Authenticate to GCP
        id: gcp-auth
        # Workload Identity Federation — see superflow-autodeploy.yml.
        # No untrusted input.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        env:
          REF: ${{ github.ref }}
        run: echo "version=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/gogocash/Dockerfile.fullstack
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GAR_REPO }}:${{ steps.version.outputs.version }}
            ${{ env.GAR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ env.GAR_REPO }}
        run: |
          {
            echo "## Superflow Release"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Image: \`$REPO:$VERSION\`"
            echo "- Also tagged: \`latest\`"
            echo ""
            echo "Run the **Superflow Deploy** workflow manually to roll this out to GCE."
          } >> "$GITHUB_STEP_SUMMARY"
