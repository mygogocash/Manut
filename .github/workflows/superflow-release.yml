name: Superflow Release

# Triggered when a `v*.*.*` tag is pushed.
#
# Builds the napi-rs native binary (linux/amd64) via Rust, then all four
# bundles (web / admin / mobile / @affine/server), then builds + pushes
# the multi-stage Docker image to Google Artifact Registry, tagged with
# both the version and `latest`.
#
# Required GitHub repository secrets:
#   - GCP_SA_KEY: service-account JSON with roles/artifactregistry.writer
#                 on project affine-495114 (or whatever project hosts the
#                 affine-gogocash repo).
#
# Deploy is intentionally a separate manual workflow (superflow-deploy.yml)
# so a tag push doesn't auto-deploy to prod without explicit approval.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  YARN_ENABLE_HARDENED_MODE: 0
  GAR_REGION: asia-southeast1
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash
  # Tier 2: shared with superflow-autodeploy.yml so a single warm cache
  # serves both pipelines. See docs/CICD.md "Buildx cache (registry-backed)".
  GAR_CACHE_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash-cache

jobs:
  build-and-push:
    name: Build bundles + image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      # Tier 2 (build determinism): pin yarn to the exact version in
      # package.json:packageManager so the release image bundle matches
      # what laptop builds produce. corepack's default ("whatever's
      # bundled with the runner") drifts between hosted runners.
      - name: Pin corepack yarn version
        run: corepack prepare yarn@4.13.0 --activate

      - name: Setup Rust (stable, x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/native/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/backend/native/Cargo.lock', 'packages/backend/native/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: yarn install --immutable

      # napi binary first — server bundle imports it, so this must come
      # before yarn affine bundle -p @affine/server.
      # napi build emits server-native.linux-x64-gnu.node (target-triple
      # name). The wrapper at packages/backend/native/index.js requires
      # ./server-native.node first, then falls back to arch-suffix names
      # (x64 / arm64 / armv7) — and rspack statically resolves all three
      # branches at compile time, even though only x64 runs in our
      # linux/amd64 prod image. Rename to the bare + arch names; touch
      # dummies for the unused arms so rspack resolution succeeds.
      # No untrusted input — all literals.
      - name: Build napi native binary (server-native.x64.node)
        # See superflow-autodeploy.yml for explanation. Don't guess
        # the napi filename — detect after build.
        run: |
          cd packages/backend/native
          yarn build --target x86_64-unknown-linux-gnu
          echo "--- files after napi build ---"
          ls -la *.node 2>&1 || true
          PRODUCED=$(ls server-native*.node 2>/dev/null | grep -v -E '^server-native(\.node|\.(x64|arm64|armv7)\.node)$' | head -1)
          if [ -z "$PRODUCED" ]; then
            if [ -f server-native.node ]; then PRODUCED=server-native.node; fi
          fi
          if [ -z "$PRODUCED" ]; then
            echo "ERROR: napi build produced no server-native*.node file" >&2
            ls -la 2>&1
            exit 1
          fi
          echo "napi produced: $PRODUCED"
          # Skip self-copy if napi already produced the canonical name.
          [ "$PRODUCED" != "server-native.x64.node" ] && cp "$PRODUCED" server-native.x64.node
          [ "$PRODUCED" != "server-native.node" ]     && cp "$PRODUCED" server-native.node
          touch server-native.arm64.node server-native.armv7.node
          echo "--- files after rename ---"
          ls -la server-native.*.node server-native.node 2>&1 | head -10

      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate

      # Tier 2 (build determinism): wipe stale dist directories before
      # bundling. Same rationale as superflow-build.yml — the
      # empty-mobile-dist incident that took prod down twice was a
      # cached stale dist tree slipping into the docker build context.
      #
      # CRITICAL: explicit paths only. A `find -path '*/dist'` glob
      # also matches vendored library dist dirs inside node_modules
      # (e.g. node_modules/react-router-dom/dist) and silently destroys
      # them. Build 25412101434 hit this on superflow-build.yml; same
      # rule applies here.
      - name: Prune stale dist artifacts
        run: |
          rm -rf packages/frontend/apps/web/dist
          rm -rf packages/frontend/apps/mobile/dist
          rm -rf packages/frontend/admin/dist
          rm -rf packages/backend/server/dist
          echo "Pruned package-owned dist directories (not node_modules)"

      - name: Build server bundle
        run: yarn affine bundle -p @affine/server

      # Mobile bundle is required: backend's DocRendererController reads
      # assets-manifest.json from /app/static/mobile at boot. Empty dir
      # crashes the server with ENOENT. See superflow-autodeploy.yml.
      - name: Build frontend bundles
        run: |
          yarn affine bundle -p web
          yarn affine bundle -p admin
          yarn affine bundle -p mobile

      # Tier 2 (build determinism): same source-drift guard as
      # superflow-autodeploy.yml. Catches the class of bugs where the
      # build process writes back into the source tree (CLAUDE.md §5
      # "Stale .js / .d.ts in packages/**/src/").
      - name: Check no source files drifted during build
        run: |
          if [ -n "$(git status --porcelain packages/ blocksuite/ tools/)" ]; then
            echo "::error::source tree drifted during build:"
            git status --short packages/ blocksuite/ tools/ | head -50
            echo ""
            echo "rspack/tsc wrote back into the source tree. The bundle"
            echo "may have picked up stale .js next to .ts/.tsx and"
            echo "produced a different output than a clean tree would."
            echo "See CLAUDE.md §5 'Stale .js / .d.ts in packages/**/src/'."
            exit 1
          fi
          echo "No source drift detected"

      - name: Authenticate to GCP
        id: gcp-auth
        # Workload Identity Federation — see superflow-autodeploy.yml.
        # No untrusted input.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Extract version + compute unique image tag
        id: version
        env:
          REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          VERSION="${REF#refs/tags/}"
          # Tier 1 reliability: every pushed image gets a run-unique tag
          # so a re-run of the same release tag never clobbers a previously
          # deployed image. The plain :v<X.Y.Z> tag is ALSO pushed so users
          # can deploy by version, but the run-unique tag is what
          # `Superflow Deploy` should target for redeployment safety.
          IMAGE_TAG="${VERSION}-${RUN_ID}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: ${IMAGE_TAG} (version: ${VERSION}, run: ${RUN_ID})"

      - name: Build + push image
        # Tier 2 (cache poisoning fix): registry-backed buildx cache
        # shared with superflow-autodeploy.yml. See that file's longer
        # comment block for rationale; the short version:
        #   - GHA cache was opaque, partitioned per-runner, not
        #     selectively invalidable. Switched to a registry image
        #     in GAR alongside the deploy image.
        #   - `no-cache-filters: assets` forces the dist-COPY stage to
        #     rebuild every time. That's the layer that got poisoned
        #     in the mobile/dist-empty incident — defense-in-depth.
        # FIRST RELEASE AFTER THIS CHANGE: cold cache, slow build.
        # Subsequent releases hit the warm cache.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/gogocash/Dockerfile.fullstack
          platforms: linux/amd64
          push: true
          # We push the run-unique tag AND the plain version tag. We do
          # NOT push :latest — floating tags are how the swap-then-smoke
          # incidents went undetected. Use the unique tag for actual
          # deploys; the version tag is for human-readable references.
          tags: |
            ${{ env.GAR_REPO }}:${{ steps.version.outputs.image_tag }}
            ${{ env.GAR_REPO }}:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ env.GAR_CACHE_REPO }}:buildx
          cache-to: type=registry,ref=${{ env.GAR_CACHE_REPO }}:buildx,mode=max
          no-cache-filters: assets

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
          REPO: ${{ env.GAR_REPO }}
          CACHE_IMAGE: ${{ env.GAR_CACHE_REPO }}:buildx
        run: |
          {
            echo "## Superflow Release"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Run-unique image tag (use this for deploy): \`$IMAGE_TAG\`"
            echo "- Plain version tag (human reference): \`$VERSION\`"
            echo "- Image: \`$REPO:$IMAGE_TAG\`"
            echo "- Buildx cache: \`$CACHE_IMAGE\`"
            echo ""
            echo "Run the **Superflow Deploy** workflow manually with"
            echo "\`tag: $IMAGE_TAG\` to roll this out to GCE under the"
            echo "Tier 1 smoke-then-swap contract."
          } >> "$GITHUB_STEP_SUMMARY"
