name: Superflow CI

# Runs on every push to main and every PR targeting main. Catches lint
# and web-bundle regressions before they reach the deploy track.
#
# What this CI does:
# 1. oxlint — fails on any new lint warning anywhere in the repo.
# 2. web bundle — `yarn affine bundle -p web/admin/mobile`. Rspack runs
#    a tsc loader on every .ts/.tsx, so frontend type regressions are
#    caught here even without a separate `tsc --noEmit` step.
#
# What it intentionally does NOT do:
#
# - **prettier**. Pre-commit (`lint-staged`) runs `prettier --write` on
#   every staged file, so anything we author is formatted on its way in.
#   Running `yarn lint:prettier` against the whole tree in CI catches
#   inherited upstream formatting drift across hundreds of files we
#   don't own — noise, not signal.
#
# - **server bundle**. Depends on the Rust-compiled napi binary
#   (`packages/backend/native/server-native.*.node`) which is
#   gitignored. Built locally before each release. The release
#   workflow installs Rust + napi-builds the binary itself.
#
# - **server typecheck**. The server's tsconfig includes `__tests__/`
#   which has pre-existing upstream TS type errors (TS7006 implicit
#   `any` in test files, TS2578 unused `@ts-expect-error` directives,
#   etc.). Running `tsc --noEmit` here drowns real signal in inherited
#   noise. Backend type regressions land via `yarn lint-staged` on
#   pre-commit (eslint with type-aware rules) and via the local server
#   bundle build before each release.
#
# Intentionally separate from the upstream AFFiNE workflows
# (build-test.yml etc) which target canary/master and depend on
# upstream-only secrets we don't have on this fork.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a fresher commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  YARN_ENABLE_HARDENED_MODE: 0

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install --immutable
      - name: oxlint --deny-warnings
        run: yarn oxlint --deny-warnings

  codegen-drift:
    name: GraphQL codegen drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Catches two failure modes from the same root cause:
    #   1. Hand-rolled exports added directly to packages/common/graphql/src/
    #      graphql/index.ts without a backing .gql file. Next codegen run
    #      silently drops them — see commit 49a92ec38 dropping
    #      adminVerifiedDocsQuery and breaking the admin bundle for ~11
    #      commits before anyone noticed.
    #   2. .gql / schema.gql edits committed without re-running codegen, so
    #      schema.ts and graphql/index.ts go stale and drift.
    # Either way: regen and fail if `git diff` is non-empty. The error
    # message tells the dev exactly which command to run.
    #
    # No untrusted input — only `runner.os` and `hashFiles()` in expressions,
    # both deterministic and safe per GitHub Actions security guidance.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install --immutable
      - name: Re-run gql codegen
        run: yarn workspace @affine/graphql build
      - name: Fail if codegen produced a diff
        run: |
          if ! git diff --exit-code -- \
              packages/common/graphql/src/schema.ts \
              packages/common/graphql/src/graphql/index.ts; then
            echo ""
            echo "::error::GraphQL codegen drift detected."
            echo ""
            echo "The committed schema.ts / graphql/index.ts do not match what"
            echo "'yarn workspace @affine/graphql build' produces against the"
            echo "current schema.gql + .gql files. Most likely causes:"
            echo ""
            echo "  - You edited a .gql file (or schema.gql) without re-running"
            echo "    codegen and committing the regenerated outputs."
            echo "  - You added a hand-rolled export to graphql/index.ts without"
            echo "    a backing .gql operation doc — the next codegen run will"
            echo "    drop it (this is what broke v1.10.2 -> main for ~11 commits)."
            echo ""
            echo "Fix locally:"
            echo "  yarn workspace @affine/graphql build"
            echo "  git add packages/common/graphql/src/schema.ts \\"
            echo "          packages/common/graphql/src/graphql/index.ts"
            echo "  git commit --amend --no-edit"
            exit 1
          fi

  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install --immutable
      # Mobile bundle skipped — Superflow is website-first for now. See
      # superflow-autodeploy.yml for the matching skip on the deploy track.
      - run: yarn affine bundle -p web
      - run: yarn affine bundle -p admin
