name: Superflow CI

# Runs on every push to main and every PR targeting main. Catches lint /
# type / web-bundle regressions before they reach the deploy track.
#
# Server bundle is intentionally NOT built here: it depends on the
# Rust-compiled napi binary (`packages/backend/native/server-native.*.node`)
# which is gitignored and only produced by `napi build --release` on a
# Rust toolchain. CI does a typecheck on the server source instead;
# the full server bundle is built locally before the release flow.
#
# Intentionally separate from the upstream AFFiNE workflows
# (build-test.yml etc) which target canary/master and depend on
# upstream-only secrets we don't have on this fork.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a fresher commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  YARN_ENABLE_HARDENED_MODE: 0

jobs:
  lint:
    name: Lint (oxlint + prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install --immutable
      - name: oxlint --deny-warnings
        run: yarn oxlint --deny-warnings
      - name: prettier --check
        run: yarn lint:prettier

  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install --immutable
      - run: yarn affine bundle -p web
      - run: yarn affine bundle -p admin
      - run: yarn affine bundle -p mobile

  typecheck-server:
    name: Typecheck server (no bundle — native binary unavailable in CI)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install --immutable
      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate
      # `tsc --noEmit` validates the source compiles, without trying to
      # link in the napi binary that isn't on disk in CI.
      - name: Typecheck @affine/server
        run: yarn workspace @affine/server tsc --noEmit
