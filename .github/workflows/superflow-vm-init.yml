name: Manut VM Init

# One-time bootstrap (idempotent — safe to re-run). Installs the Tier 1
# safe-deploy scripts AND the canary overlay file onto the GCE VM.
#
# IMPORTANT: this workflow does NOT modify the existing
# /srv/affine/compose/compose.yml. The canary service is added via a
# SEPARATE file (compose.canary.yml) that's loaded only at deploy time
# via `docker compose -f compose.yml -f compose.canary.yml`. Production
# compose.yml carries operator-specific config (env_file paths,
# external-managed Postgres + Redis topology, secrets) that we don't
# want to lose by templating.
#
# Run this once after Tier 1 ships, then any future deploy is
# automatically smoke-validated via the canary overlay.
#
# What this workflow does (in order, all idempotent):
#   1. Validate the three source files exist in the repo at HEAD.
#   2. WIF-auth to GCP.
#   3. scp the three files to /tmp/ on the VM.
#   4. SSH in and:
#      a. mkdir -p /srv/affine/scripts
#      b. install -m 755 the deploy + rollback scripts
#      c. install -m 644 the canary overlay file at
#         /srv/affine/compose/compose.canary.yml (NEW file, additive)
#      d. validate `docker compose -f compose.yml -f compose.canary.yml
#         config` succeeds — this confirms the overlay is compatible
#         with the live compose.yml
#   5. Job summary listing what was installed.
#
# This workflow is INTENTIONALLY workflow_dispatch-only (no auto-trigger).
# Bootstrapping is a deliberate one-shot decision per VM.

on:
  workflow_dispatch:

env:
  GCP_PROJECT: affine-495114
  GCE_ZONE: asia-southeast1-a
  GCE_VM: affine-vm

jobs:
  init:
    name: Install scripts + canary overlay on VM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate source files exist in repo
        run: |
          missing=0
          for f in scripts/vm/deploy.sh scripts/vm/rollback.sh scripts/vm/compose.canary.yml; do
            if [ ! -f "$f" ]; then
              echo "::error::$f missing from repo"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "All three source files present"
          ls -la scripts/vm/

      - name: Authenticate to GCP
        # WIF — see superflow-autodeploy.yml. No untrusted input.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: scp scripts + canary overlay to /tmp on VM
        run: |
          gcloud compute scp \
            scripts/vm/deploy.sh \
            scripts/vm/rollback.sh \
            scripts/vm/compose.canary.yml \
            "$GCE_VM":/tmp/ \
            --zone="$GCE_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap

      # All commands are literals — no untrusted input is interpolated.
      # SAFE bootstrap: installs scripts + the canary overlay file as a
      # SEPARATE companion to the existing compose.yml. Production
      # compose.yml is NEVER modified by this workflow — that would risk
      # losing operator-specific env_file paths, secrets, and the
      # external-managed-services topology (Postgres + Redis on Cloud SQL
      # / GCE VPC IPs). The canary service is added via compose's `-f`
      # overlay pattern at deploy time only.
      - name: Install scripts + canary overlay
        id: install
        run: |
          gcloud compute ssh "$GCE_VM" \
            --zone="$GCE_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command='set -e
              echo "--- Installing deploy + rollback scripts ---"
              sudo mkdir -p /srv/affine/scripts
              sudo install -m 755 /tmp/deploy.sh   /srv/affine/scripts/deploy.sh
              sudo install -m 755 /tmp/rollback.sh /srv/affine/scripts/rollback.sh
              ls -la /srv/affine/scripts/

              echo "--- Installing canary overlay (separate file, does NOT replace compose.yml) ---"
              sudo install -m 644 /tmp/compose.canary.yml /srv/affine/compose/compose.canary.yml
              ls -la /srv/affine/compose/compose.canary.yml

              echo "--- Validating overlay against existing compose.yml ---"
              # Validate that compose.yml + compose.canary.yml together
              # parse into a coherent project. Does NOT start anything.
              cd /srv/affine/compose
              sudo docker compose -f compose.yml -f compose.canary.yml config > /dev/null
              echo "docker compose -f compose.yml -f compose.canary.yml config: OK"

              echo "--- Final state ---"
              echo "scripts:"
              ls -la /srv/affine/scripts/
              echo ""
              echo "compose dir:"
              ls -la /srv/affine/compose/
              echo ""
              echo "production image tag (from compose.yml — UNCHANGED by this workflow):"
              grep -E "affine-gogocash:" /srv/affine/compose/compose.yml || true
            '

      - name: Summary
        if: always()
        run: |
          {
            echo "## Manut VM Init"
            echo ""
            echo "Installed on \`${GCE_VM}\` in \`${GCE_ZONE}\`:"
            echo ""
            echo "- /srv/affine/scripts/deploy.sh         (mode 755)"
            echo "- /srv/affine/scripts/rollback.sh       (mode 755)"
            echo "- /srv/affine/compose/compose.canary.yml (NEW overlay file, mode 644)"
            echo ""
            echo "Production compose.yml: NOT MODIFIED. Canary is loaded only"
            echo "at deploy time via \`docker compose -f compose.yml -f compose.canary.yml\`."
            echo ""
            echo "Next steps:"
            echo "1. Trigger Manut Auto Deploy via any push to main, OR"
            echo "2. Manually deploy any pushed image: \`gh workflow run superflow-deploy.yml -f tag=<tag>\`"
            echo "3. Deploys now use the smoke-then-swap pattern. Pre-validation"
            echo "   failures leave production untouched."
          } >> "$GITHUB_STEP_SUMMARY"
