name: 'Pull Request Labeler'

# Pentest H12 — pull_request_target runs in the BASE repo context with
# secret access, so the default GITHUB_TOKEN scope is the blast radius if
# any future job in this file omits its own permissions block. Pinning to
# `{}` here means jobs must explicitly opt into the minimum they need
# (the triage job below does so already).
permissions: {}

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/labeler@v6
