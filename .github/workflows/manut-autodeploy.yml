name: 🚀 Manut Auto Deploy
run-name: "🚀 Auto Deploy #${{ github.run_number }} • ${{ github.event.workflow_run.display_title || 'manual' }} • by ${{ github.actor }}"

# Tier 2 split: this workflow ONLY deploys an already-built image. It
# fires when `Manut Build` succeeds, fetches the resulting tag from
# the build run's `image-tag` artifact, and SSHes /srv/affine/scripts/
# deploy.sh on the VM. No bundling, no docker build — it should run in
# ~2-3 min including cold gcloud auth.
#
# Pipeline:
#   push → Manut CI → Manut Build (this workflow's trigger) →
#     Manut Auto Deploy → deploy.sh on VM (smoke-then-swap)
#
# Trigger:
#   workflow_run on `Manut Build` success on `main`.
#
# Image-tag handoff (the gh-api fallback story):
#   The intuitive approach would be to read the build's job outputs via
#   `${{ github.event.workflow_run.outputs.* }}`. This DOES NOT WORK —
#   the `workflow_run` event payload does not expose downstream job
#   outputs, even when the upstream workflow declares them. This is a
#   well-known and intentional limitation of the GHA event model.
#
#   The supported pattern is to fetch the artifact uploaded by the
#   build run. We use `gh run download` (which calls the same `gh api`
#   endpoint internally) keyed on the build run id from
#   `github.event.workflow_run.id`. The artifact is named `image-tag`
#   and contains a single key=value file we parse here.
#
# Tier 2 supersession (concurrency lock fix):
#   This workflow passes `--supersede-run-id ${{ github.run_id }}` to
#   deploy.sh. Two deploy runs landing seconds apart no longer queue
#   on flock — the newer run preempts the older one (kills the older
#   deploy.sh process, takes the lock). The older deploy.sh exits 4
#   (status=superseded) which we treat as a warning, not a failure.
#
# Exit-code contract from /srv/affine/scripts/deploy.sh (CRITICAL):
#   0 = success — prod is on the new image
#   1 = sidecar validation failed — prod was NEVER touched, still on prior
#       image. No rollback needed.
#   2 = post-swap smoke failed — auto-rolled back, prod is on prior image.
#   3 = rollback itself failed — prod may be DOWN. Manual intervention.
#   4 = superseded — this deploy bowed out because a newer one took over;
#       NOT a failure (the newer deploy is what runs).
#   *  = anything else — treated as 3.
#
# WIF auth (no JSON key — org policy forbids them):
#   provider: projects/602860445793/.../providers/github
#   service account: affine-gha-deployer@affine-495114.iam.gserviceaccount.com
# That SA has iam.serviceAccountUser on the affine-vm runtime SA, which
# is what makes `gcloud compute ssh` work over IAP.

on:
  workflow_run:
    workflows: ['🏗️ Manut Build']
    types: [completed]
    branches: [main]

# We INTENTIONALLY remove cancel-in-progress here. With Tier 2's
# in-script supersession, if two deploys race we want both runners to
# run far enough to call deploy.sh — the older deploy.sh will exit 4
# (status=superseded) and the newer one will run end-to-end. Cancelling
# at the GHA level would just kill the runner mid-SSH, leaving the
# remote deploy.sh still going (it's an independent process under sudo)
# without any signalling back. The supersession lives on the VM, not in
# GHA's concurrency engine.
concurrency:
  group: manut-autodeploy

env:
  GAR_REGION: asia-southeast1
  GAR_REPO: asia-southeast1-docker.pkg.dev/affine-495114/affine/affine-gogocash
  GCP_PROJECT: affine-495114
  GCE_ZONE: asia-southeast1-a
  GCE_VM: affine-vm
  PROD_HOST: manut.xyz
  SMOKE_TIMEOUT_SECS: '90'

jobs:
  deploy:
    name: Resolve tag + safe-deploy
    # Only run when the build succeeded on a push event to main (not a
    # workflow_run from a fork or a re-run of a failed build).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Match the SHA the build was run against — keeps any local
          # tooling (e.g. tag validators if we add them later) consistent
          # with what was actually shipped.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image tag (artifact + gh-api fallback)
        id: resolve_tag
        # Two-step resolution. We prefer downloading the upstream artifact
        # via `gh run download`; if it's missing we abort with a useful
        # error rather than silently deploying nothing.
        #
        # NOTE on workflow_run.outputs: GitHub does NOT propagate the
        # upstream `jobs.<id>.outputs.*` map through the workflow_run
        # event payload. `github.event.workflow_run.outputs` is always
        # empty. Don't be tempted to read it — the artifact below is the
        # source of truth.
        env:
          BUILD_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p ./_artifact
          echo "Fetching image-tag artifact from build run ${BUILD_RUN_ID}"
          # gh run download writes the artifact contents into the named
          # output dir. With --name image-tag, the file image-tag.txt
          # ends up at ./_artifact/image-tag.txt.
          if ! gh run download "${BUILD_RUN_ID}" \
                 --repo "${GH_REPO}" \
                 --name image-tag \
                 --dir ./_artifact; then
            echo "::error::Failed to download image-tag artifact from build run ${BUILD_RUN_ID}."
            echo "::error::This usually means the build job did not upload the artifact (e.g. it failed before the upload step)."
            echo "::error::Check: gh run view ${BUILD_RUN_ID} --repo ${GH_REPO}"
            exit 1
          fi
          if [ ! -f ./_artifact/image-tag.txt ]; then
            echo "::error::Artifact downloaded but image-tag.txt not present at expected path"
            ls -la ./_artifact/ || true
            exit 1
          fi
          echo "--- image-tag.txt ---"
          cat ./_artifact/image-tag.txt
          # Parse key=value lines. Ignore anything that doesn't match.
          IMAGE_TAG=$(grep -E '^image_tag=' ./_artifact/image-tag.txt | head -1 | cut -d= -f2-)
          SHORT_SHA=$(grep -E '^short_sha=' ./_artifact/image-tag.txt | head -1 | cut -d= -f2-)
          HEAD_SHA=$(grep -E '^head_sha=' ./_artifact/image-tag.txt | head -1 | cut -d= -f2-)
          if [ -z "${IMAGE_TAG}" ]; then
            echo "::error::image_tag missing from artifact"
            exit 1
          fi
          # Defensive charset check — same rule as manut-deploy.yml.
          if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::Resolved image tag contains characters outside [A-Za-z0-9._-]: ${IMAGE_TAG}"
            exit 1
          fi
          {
            echo "tag=${IMAGE_TAG}"
            echo "short_sha=${SHORT_SHA}"
            echo "head_sha=${HEAD_SHA}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${IMAGE_TAG}"

      - name: Authenticate to GCP
        # Workload Identity Federation — see manut-build.yml.
        # No untrusted input — only literal WIF provider id and SA email.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/602860445793/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'affine-gha-deployer@affine-495114.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify image exists in GAR
        # Cheap defense-in-depth: confirm the build did push the tag we
        # resolved. If the artifact promised a tag the build never
        # actually pushed (e.g. push-step failed silently), bail before
        # SSHing anything.
        env:
          GAR_REPO_VAR: ${{ env.GAR_REPO }}
          IMAGE_TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          if gcloud artifacts docker images describe \
               "${GAR_REPO_VAR}:${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Tag verified in GAR: ${GAR_REPO_VAR}:${IMAGE_TAG}"
          else
            echo "::error::Tag '${IMAGE_TAG}' not found in GAR (${GAR_REPO_VAR})"
            echo "::error::Build run pushed this tag in its summary but GAR does not have it."
            exit 1
          fi

      # IMAGE_TAG is `main-<9hex>-<numeric>` — charset-validated above,
      # cannot contain shell metacharacters. Pass via env to keep the
      # SSH command shell-safe. RUN_ID is the numeric GHA run id, used
      # for deploy.sh's --supersede-run-id supersession (Tier 2).
      - name: Safe-deploy to GCE VM (smoke-then-swap, with supersede)
        id: deploy
        env:
          GCE_VM: ${{ env.GCE_VM }}
          GCE_ZONE: ${{ env.GCE_ZONE }}
          GCP_PROJECT: ${{ env.GCP_PROJECT }}
          IMAGE_TAG: ${{ steps.resolve_tag.outputs.tag }}
          SMOKE_TIMEOUT_SECS: ${{ env.SMOKE_TIMEOUT_SECS }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          gcloud compute ssh "$GCE_VM" \
            --zone="$GCE_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command="sudo /srv/affine/scripts/deploy.sh \
              --image-tag '${IMAGE_TAG}' \
              --smoke-timeout-secs ${SMOKE_TIMEOUT_SECS} \
              --rollback-on-failure \
              --supersede-run-id ${RUN_ID}"
          DEPLOY_RC=$?
          set -e
          echo "deploy_rc=${DEPLOY_RC}" >> "$GITHUB_OUTPUT"
          echo "deploy.sh exit code: ${DEPLOY_RC}"
          # Defer the actual job-fail to the Summary step so we can emit
          # a useful job-summary first.
          exit 0

      - name: Summary
        # Always run — the job-summary should be written even if deploy
        # failed. Final `exit` honors deploy.sh exit code so the workflow
        # status reflects reality (with exit code 4 treated as a warning).
        if: always()
        env:
          IMAGE_TAG: ${{ steps.resolve_tag.outputs.tag }}
          SHORT_SHA: ${{ steps.resolve_tag.outputs.short_sha }}
          HEAD_SHA: ${{ steps.resolve_tag.outputs.head_sha }}
          DEPLOY_RC: ${{ steps.deploy.outputs.deploy_rc }}
          PROD_HOST_VAR: ${{ env.PROD_HOST }}
          GCE_VM: ${{ env.GCE_VM }}
          GCE_ZONE: ${{ env.GCE_ZONE }}
          GCP_PROJECT: ${{ env.GCP_PROJECT }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## Manut Auto Deploy"
            echo ""
            echo "- Commit: \`${SHORT_SHA:-unknown}\` (\`${HEAD_SHA:-unknown}\`)"
            echo "- Image tag: \`${IMAGE_TAG:-unknown}\`"
            echo "- Production: https://${PROD_HOST_VAR}"
            echo "- This run id: \`${RUN_ID}\` (passed as --supersede-run-id)"
            echo "- deploy.sh exit code: \`${DEPLOY_RC:-?}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          case "${DEPLOY_RC:-}" in
            0)
              {
                echo "### Status: SUCCESS"
                echo ""
                echo "Deployed \`${IMAGE_TAG}\`. Prod is on the new image."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            1)
              {
                echo "### Status: VALIDATION FAILED (prod untouched)"
                echo ""
                echo "The new image failed pre-deploy sidecar validation."
                echo "Production is still on the previous image — nothing"
                echo "was swapped. Investigate the new image, then either"
                echo "re-deploy a fixed build or roll forward."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              {
                echo "### Status: AUTO-ROLLED BACK"
                echo ""
                echo "The new image passed sidecar validation but failed"
                echo "the post-swap smoke test. deploy.sh auto-rolled back"
                echo "to the previous image. Production is on the previous"
                echo "image."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            3)
              {
                echo "### Status: CRITICAL — ROLLBACK FAILED"
                echo ""
                echo "The new image failed AND the rollback step itself"
                echo "failed. Production may be DOWN. SSH to the VM and"
                echo "investigate immediately:"
                echo ""
                echo '```bash'
                echo "gcloud compute ssh ${GCE_VM} --zone=${GCE_ZONE} --project=${GCP_PROJECT} --tunnel-through-iap"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            4)
              {
                echo "### Status: SUPERSEDED (warning, not a failure)"
                echo ""
                echo "This deploy was preempted by a newer deploy that"
                echo "started while this one was running. The newer deploy"
                echo "is the one whose result reflects production state —"
                echo "look at the next \`Manut Auto Deploy\` run."
                echo ""
                echo "If no newer run exists, something is wrong: SSH the"
                echo "VM and inspect /tmp/affine-deploy.runid + the live"
                echo "container."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              {
                echo "### Status: UNKNOWN EXIT CODE (treated as critical)"
                echo ""
                echo "deploy.sh exited with code \`${DEPLOY_RC:-empty}\`. Treating"
                echo "as a possible production outage. SSH to the VM and"
                echo "investigate immediately."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

          # Honor exit code: 0 = success (job green), 4 = superseded
          # (job green with warning), anything else = job red.
          case "${DEPLOY_RC:-}" in
            0|4) exit 0 ;;
            *)   exit 1 ;;
          esac

      - name: Notify Slack
        # Tier 2: opt-in Slack notification on every deploy outcome.
        # Skipped silently when SLACK_WEBHOOK_URL is unset — workflows
        # never fail because Slack is unconfigured. The webhook URL is
        # routed through env: ONLY (never inlined into shell command
        # strings or echoed) so it can't leak via job logs. All other
        # ${{ }} values also flow through env: per the workflow-injection
        # hardening pattern.
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OUTCOME: ${{ job.status }}
          DEPLOY_RC: ${{ steps.deploy.outputs.deploy_rc }}
          IMAGE_TAG: ${{ steps.resolve_tag.outputs.tag }}
          SHORT_SHA: ${{ steps.resolve_tag.outputs.short_sha }}
          FULL_SHA: ${{ steps.resolve_tag.outputs.head_sha }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not configured — skipping notification"
            exit 0
          fi

          # Pick a status line based on deploy.sh's exit-code contract.
          # OUTCOME alone is not enough: a green job might still mean
          # "rolled back successfully" depending on DEPLOY_RC.
          case "${DEPLOY_RC:-}" in
            0)
              msg=$(printf '%s\n%s\n%s' \
                "✅ ${REPO}@${SHORT_SHA:-unknown}: deployed via ${WORKFLOW_NAME}" \
                "Image: ${IMAGE_TAG}" \
                "Run: ${RUN_URL}")
              ;;
            1)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "🔴 ${REPO}@${SHORT_SHA:-unknown}: deploy FAILED via ${WORKFLOW_NAME}" \
                "Reason: sidecar validation failed (prod untouched, still on prior tag)" \
                "Run: ${RUN_URL}" \
                "Production: still on prior tag")
              ;;
            2)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "🔴 ${REPO}@${SHORT_SHA:-unknown}: deploy FAILED via ${WORKFLOW_NAME}" \
                "Reason: post-swap smoke or prompt-seed failed; auto-rolled back" \
                "Run: ${RUN_URL}" \
                "Production: still on prior tag")
              ;;
            3)
              msg=$(printf '%s\n%s\n%s\n%s' \
                "🚨 ${REPO}@${SHORT_SHA:-unknown}: deploy FAILED via ${WORKFLOW_NAME}" \
                "Reason: rollback itself failed — production may be DOWN" \
                "Run: ${RUN_URL}" \
                "Production: manually intervene")
              ;;
            4)
              msg=$(printf '%s\n%s\n%s' \
                "⚠️ ${REPO}@${SHORT_SHA:-unknown}: ${WORKFLOW_NAME} superseded" \
                "Reason: a newer deploy preempted this one (Tier 2 supersession)" \
                "Run: ${RUN_URL}")
              ;;
            *)
              # No DEPLOY_RC — the deploy step never ran (e.g. earlier
              # build step failed). Fall back on job.status.
              if [ "${OUTCOME}" = "success" ]; then
                msg=$(printf '%s\n%s' \
                  "✅ ${REPO}@${SHORT_SHA:-unknown}: ${WORKFLOW_NAME} succeeded" \
                  "Run: ${RUN_URL}")
              else
                msg=$(printf '%s\n%s\n%s\n%s' \
                  "🔴 ${REPO}@${SHORT_SHA:-unknown}: deploy FAILED via ${WORKFLOW_NAME}" \
                  "Reason: workflow failed before deploy ran (build / auth / setup)" \
                  "Run: ${RUN_URL}" \
                  "Production: still on prior tag")
              fi
              ;;
          esac

          # jq builds the JSON envelope safely — `--arg t` JSON-escapes
          # quotes, backslashes, newlines, etc. so the body always parses.
          # `curl --silent --show-error` keeps a redacted-friendly log
          # (no `-v`); `|| true` ensures a 5xx from Slack never breaks
          # the workflow.
          payload=$(jq -nc --arg t "$msg" '{text:$t}')
          curl --silent --show-error --max-time 10 \
            -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL" \
            >/dev/null 2>&1 || true
          echo "Slack notification dispatched."
