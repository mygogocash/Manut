name: 🔬 Manut Railway Token Diagnose
run-name: '🔬 Diagnose RAILWAY_TOKEN type (manual only)'

# Throwaway diagnostic workflow. Identifies which TYPE of token is currently
# stored in the RAILWAY_TOKEN secret, by trying each of the 3 Railway token
# classes against their canonical query.
#
# Token never echoed. Token passed via env, never shell-interpolated.
# No github.event.* untrusted inputs used.
#
# Reference: https://docs.railway.com/integrations/api#choosing-a-token-type
#
# Delete this file after you have your answer.

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    name: Identify RAILWAY_TOKEN type
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe 1 — Bearer + me query (Account token signal)
        id: account
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -eu
          RESPONSE=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { me { name email } }"}')
          echo "Response shape:"
          echo "$RESPONSE" | jq -c '{has_data: (.data != null), me_present: (.data.me != null), me_has_name: (.data.me.name != null), error_message: (.errors[0]?.message // null)}'
          if echo "$RESPONSE" | jq -e '.data.me.name != null' >/dev/null 2>&1; then
            echo "is_account_token=yes" >> "$GITHUB_OUTPUT"
          else
            echo "is_account_token=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Probe 2 — Bearer + workspace query (Workspace token signal)
        if: steps.account.outputs.is_account_token != 'yes'
        id: workspace
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          WORKSPACE_ID: 3512f623-aa19-48db-bf69-e3853ab9d842
        run: |
          set -eu
          BODY=$(jq -n --arg wid "$WORKSPACE_ID" '{query: ("query { workspace(workspaceId: \"" + $wid + "\") { id name } }")}')
          RESPONSE=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "Response shape:"
          echo "$RESPONSE" | jq -c '{has_data: (.data != null), workspace_present: (.data.workspace != null), workspace_name: (.data.workspace.name // null), error_message: (.errors[0]?.message // null)}'
          if echo "$RESPONSE" | jq -e '.data.workspace.name != null' >/dev/null 2>&1; then
            echo "is_workspace_token=yes" >> "$GITHUB_OUTPUT"
          else
            echo "is_workspace_token=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Probe 3 — Project-Access-Token header (Project token signal)
        if: steps.account.outputs.is_account_token != 'yes'
        id: project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -eu
          RESPONSE=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Project-Access-Token: ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { projectToken { projectId environmentId } }"}')
          echo "Response shape:"
          echo "$RESPONSE" | jq -c '{has_data: (.data != null), project_token_present: (.data.projectToken != null), error_message: (.errors[0]?.message // null)}'
          if echo "$RESPONSE" | jq -e '.data.projectToken.projectId != null' >/dev/null 2>&1; then
            echo "is_project_token=yes" >> "$GITHUB_OUTPUT"
          else
            echo "is_project_token=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Verdict
        env:
          IS_ACCOUNT: ${{ steps.account.outputs.is_account_token }}
          IS_WORKSPACE: ${{ steps.workspace.outputs.is_workspace_token }}
          IS_PROJECT: ${{ steps.project.outputs.is_project_token }}
        run: |
          set -eu
          {
            echo "## RAILWAY_TOKEN diagnosis"
            echo ""
            if [ "$IS_ACCOUNT" = "yes" ]; then
              echo "✅ **Account token** — correct type for the Railway Deploy workflow."
            elif [ "$IS_WORKSPACE" = "yes" ]; then
              echo "✅ **Workspace token** for Fronk Space — correct type."
            elif [ "$IS_PROJECT" = "yes" ]; then
              echo "❌ **Project token** — WRONG TYPE. Create an Account or Workspace token at https://railway.com/account/tokens"
            else
              echo "❌ **Token does not match any known type** — expired, revoked, or copied incorrectly. Create a fresh one at https://railway.com/account/tokens"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"
