# Reference compose.yml for the production VM.
#
# THIS IS A TEMPLATE. The live file at /srv/affine/compose/compose.yml
# carries production-specific bits (env files, mount paths, secrets) that
# vary by host. Reconcile by hand when adopting the canary pattern — DO
# NOT blind-copy.
#
# Two affine services share the same DB, Redis, and persistent volumes:
#
#   - `affine`         — production. Caddy proxies to it on port 3010.
#                        Image: ${REGISTRY}/affine-gogocash:${LIVE_IMAGE_TAG}.
#
#   - `affine_canary`  — sidecar for smoke validation. Disabled by default
#                        via the `validation` profile (won't auto-start
#                        with `docker compose up -d`). Brought up only by
#                        scripts/vm/deploy.sh during the smoke phase.
#                        Listens on host port 3011 (separate from prod).
#                        Image:
#                          ${REGISTRY}/affine-gogocash:${IMAGE_TAG_OVERRIDE:-${LIVE_IMAGE_TAG}}
#                        deploy.sh sets IMAGE_TAG_OVERRIDE to the new tag
#                        for the duration of the smoke phase, then unsets
#                        it before swapping production.
#
# Required env (managed by deploy.sh — see compose.yml.env.example):
#   REGISTRY            Container registry prefix
#   LIVE_IMAGE_TAG      The tag production is currently running
#   IMAGE_TAG_OVERRIDE  Set only during sidecar smoke; empty otherwise

services:
  postgres:
    image: postgres:16-alpine
    container_name: affine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: affine
    volumes:
      - /srv/affine/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U affine -d affine']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: affine_redis
    restart: unless-stopped
    volumes:
      - /srv/affine/data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  affine_migration_job:
    # One-shot Prisma migration. Uses the production image, runs
    # idempotent migrations, and exits. Compose treats `restart: no`
    # plus a non-zero exit as a deploy failure surface — handy.
    image: ${REGISTRY}/affine-gogocash:${LIVE_IMAGE_TAG}
    container_name: affine_migration_job
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /srv/affine/data/affine.env
    command:
      [
        'node',
        '--experimental-specifier-resolution=node',
        './scripts/self-host-predeploy.js',
      ]

  affine:
    # Production server. Caddy proxies 80 -> :3010 here.
    image: ${REGISTRY}/affine-gogocash:${LIVE_IMAGE_TAG}
    container_name: affine_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      affine_migration_job:
        condition: service_completed_successfully
    env_file:
      - /srv/affine/data/affine.env
    ports:
      - '3010:3010'
    volumes:
      - /srv/affine/data/affine-storage:/root/.affine/storage
      - /srv/affine/data/affine-config:/root/.affine/config

  affine_canary:
    # Smoke-test sidecar. Same image+config as production, different
    # port. `profiles: [validation]` keeps it out of regular `up -d`.
    # deploy.sh starts it with `docker compose --profile validation up
    # -d affine_canary` and stops it before swapping production.
    image: ${REGISTRY}/affine-gogocash:${IMAGE_TAG_OVERRIDE:-${LIVE_IMAGE_TAG}}
    container_name: affine_canary
    restart: 'no'
    profiles:
      - validation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - /srv/affine/data/affine.env
    ports:
      - '3011:3010'
    volumes:
      - /srv/affine/data/affine-storage:/root/.affine/storage
      - /srv/affine/data/affine-config:/root/.affine/config

  caddy:
    image: caddy:2-alpine
    container_name: affine_caddy
    restart: unless-stopped
    depends_on:
      - affine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /srv/affine/data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/affine/data/caddy/data:/data
      - /srv/affine/data/caddy/config:/config
