<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=<%= VIEWPORT_FIT %>"
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Manut</title>
    <!--
      Theme color matches the dark canvas in manut-tokens.css
      (`--manut-surface-canvas` dark = #0e0e10), since dark is the
      new-user default per decision #14. Browser chrome on iOS/Android
      tints to the canvas so the system bar reads as one continuous
      surface with the app.
    -->
    <meta name="theme-color" content="#0e0e10" />
    <%= PRECONNECT %>
    <!--
      Manut typography (decision #4) — Geist Sans for UI body, Geist
      Mono for code, Instrument Serif for editorial display. Preconnect
      to both Google Fonts hosts before the stylesheet request so the
      DNS + TLS roundtrip overlaps with HTML parsing. `display=swap`
      keeps text painted in the fallback stack while web fonts arrive,
      avoiding FOIT. System-font fallbacks are declared in
      packages/frontend/component/src/theme/manut-tokens.css so the app
      degrades gracefully if Google Fonts is blocked.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/favicon-192.png" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <meta name="emotion-insertion-point" content="" />
    <meta property="description" content="<%= DESCRIPTION %>" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://manut.xyz/" />
    <meta name="twitter:title" content="Manut" />
    <meta name="twitter:description" content="<%= DESCRIPTION %>" />
    <meta property="og:title" content="Manut" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="<%= DESCRIPTION %>" />
    <meta property="og:url" content="https://manut.xyz/" />
  </head>

  <body>
    <div id="app" data-version="<%= GIT_SHORT_SHA %>"></div>
  </body>
</html>
