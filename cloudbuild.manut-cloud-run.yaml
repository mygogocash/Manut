# Cloud Build template for the Manut Cloud Run target.
#
# This is intentionally separate from .github/workflows/manut-build.yml.
# The GitHub workflow remains the current production signal while this file
# is used for the GCP cutover rehearsal and, later, the Cloud Build trigger.

substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: manut
  _MIGRATION_JOB_NAME: manut-migrate
  _GAR_REPOSITORY: affine
  _IMAGE_NAME: affine-gogocash
  _RUNTIME_SERVICE_ACCOUNT: manut-cloud-run@affine-495114.iam.gserviceaccount.com
  _EXTERNAL_URL: https://manut.xyz
  _VPC_NETWORK: default
  _VPC_SUBNET: default
  _VPC_EGRESS: private-ranges-only
  _REDIS_SERVER_HOST: 10.0.0.2
  _REDIS_SERVER_PORT: '6379'
  _MIN_INSTANCES: '1'
  _MAX_INSTANCES: '20'
  _CONCURRENCY: '40'
  _CPU: '2'
  _MEMORY: 4Gi
  _TIMEOUT: 3600s
  _DATABASE_URL_SECRET: manut-database-url
  _AFFINE_CONFIG_JSON_B64_SECRET: manut-affine-config-json-b64
  _REDIS_PASSWORD_SECRET: manut-redis-password
  _GOOGLE_OAUTH_CLIENT_SECRET: manut-google-oauth-client-secret

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
  machineType: E2_HIGHCPU_8

timeout: 7200s

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_GAR_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA

steps:
  - id: build image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=.docker/manut/Dockerfile.railway
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_GAR_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA
      - --build-arg=GITHUB_SHA=$SHORT_SHA
      - .

  - id: push image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_GAR_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA

  - id: upsert migration job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE="$_REGION-docker.pkg.dev/$PROJECT_ID/$_GAR_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA"
        COMMON_FLAGS=(
          --project="$PROJECT_ID"
          --region="$_REGION"
          --image="$IMAGE"
          --service-account="$_RUNTIME_SERVICE_ACCOUNT"
          --cpu="$_CPU"
          --memory="$_MEMORY"
          --task-timeout="$_TIMEOUT"
          --max-retries=0
          --parallelism=1
          --tasks=1
          --network="$_VPC_NETWORK"
          --subnet="$_VPC_SUBNET"
          --vpc-egress="$_VPC_EGRESS"
          --set-env-vars=MANUT_RUN_STARTUP_MIGRATIONS=false
          --set-secrets=DATABASE_URL=$_DATABASE_URL_SECRET:latest,AFFINE_CONFIG_JSON_B64=$_AFFINE_CONFIG_JSON_B64_SECRET:latest
          --command=./node_modules/.bin/prisma
          --args=migrate,deploy,--schema=./schema.prisma
        )

        if gcloud run jobs describe "$_MIGRATION_JOB_NAME" --project="$PROJECT_ID" --region="$_REGION" >/dev/null 2>&1; then
          gcloud run jobs update "$_MIGRATION_JOB_NAME" "${COMMON_FLAGS[@]}"
        else
          gcloud run jobs create "$_MIGRATION_JOB_NAME" "${COMMON_FLAGS[@]}"
        fi

  - id: run migrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - run
      - jobs
      - execute
      - $_MIGRATION_JOB_NAME
      - --project=$PROJECT_ID
      - --region=$_REGION
      - --wait

  - id: deploy service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --project=$PROJECT_ID
      - --region=$_REGION
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_GAR_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA
      - --service-account=$_RUNTIME_SERVICE_ACCOUNT
      - --platform=managed
      - --execution-environment=gen2
      - --allow-unauthenticated
      - --ingress=all
      - --port=3010
      - --cpu=$_CPU
      - --memory=$_MEMORY
      - --timeout=$_TIMEOUT
      - --concurrency=$_CONCURRENCY
      - --min-instances=$_MIN_INSTANCES
      - --max-instances=$_MAX_INSTANCES
      - --network=$_VPC_NETWORK
      - --subnet=$_VPC_SUBNET
      - --vpc-egress=$_VPC_EGRESS
      - --set-env-vars=AFFINE_SERVER_EXTERNAL_URL=$_EXTERNAL_URL,AFFINE_SERVER_HTTPS=true,MANUT_RUN_STARTUP_MIGRATIONS=false,REDIS_SERVER_HOST=$_REDIS_SERVER_HOST,REDIS_SERVER_PORT=$_REDIS_SERVER_PORT,REDIS_SERVER_DATABASE=0
      - --set-secrets=DATABASE_URL=$_DATABASE_URL_SECRET:latest,AFFINE_CONFIG_JSON_B64=$_AFFINE_CONFIG_JSON_B64_SECRET:latest,REDIS_SERVER_PASSWORD=$_REDIS_PASSWORD_SECRET:latest,GOOGLE_OAUTH_CLIENT_SECRET=$_GOOGLE_OAUTH_CLIENT_SECRET:latest
